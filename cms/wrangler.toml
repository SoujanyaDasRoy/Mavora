name = "mavora-cms"
# Adapted from Task 17's brief: `main` points at workers/scheduled-entry.js
# instead of `.open-next/worker.js` directly. `.open-next/worker.js` (the
# adapter's build output) only exports a `fetch` handler, and Cloudflare
# Cron Triggers invoke a `scheduled` handler, which the adapter doesn't
# generate (checked node_modules/@opennextjs/cloudflare 1.20.1 -- no
# `scheduled` support in its templates or config API as of this version).
# workers/scheduled-entry.js wraps the generated worker, re-exporting its
# `fetch` unchanged and adding the `scheduled` handler that runs the weekly
# R2 orphan cleanup (app/api/cron/cleanup-media's underlying logic). See
# that file's header comment for the full reasoning.
main = "workers/scheduled-entry.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Adapted from the brief: @opennextjs/cloudflare 1.20.1 deploys the app as a
# Cloudflare Worker (via `wrangler deploy`), not as a Cloudflare Pages
# project. `main` and `[assets]` are required by the adapter's build output
# and were not in the original brief, which assumed a Pages deploy.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "mavora-cms"
database_id = "a4102f3b-7b6c-4ab8-854f-67ad5254e8ee"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "mavora-cms-media"

# Weekly R2 orphan cleanup (Task 17). Fires Monday 03:00 UTC -- a low-traffic
# window, well clear of any request load -- and invokes the `scheduled`
# handler in workers/scheduled-entry.js (see `main` above), not an HTTP
# route: Cron Triggers don't produce an HTTP request for Next.js to route.
[triggers]
crons = ["0 3 * * 1"]
